<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Atendimento</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #061a40, #123c69);
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .topo {
      position: absolute;
      top: 25px;
      width: 100%;
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .card {
      width: 80%;
      max-width: 1100px;
      min-height: 430px;
      background: rgba(255,255,255,0.13);
      border: 4px solid rgba(255,255,255,0.35);
      border-radius: 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .label { font-size: 50px; opacity: .9; }
    .senha {
      font-size: 180px;
      font-weight: 900;
      line-height: 1;
      margin: 25px 0;
      color: #ffeb3b;
      text-shadow: 6px 6px 0 rgba(0,0,0,0.25);
    }
    .mesa {
      font-size: 80px;
      font-weight: bold;
      background: #ffffff;
      color: #0b2c59;
      padding: 18px 70px;
      border-radius: 22px;
    }
    .historico {
      position: absolute;
      bottom: 20px;
      width: 90%;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .item {
      background: rgba(255,255,255,0.18);
      padding: 14px 26px;
      border-radius: 15px;
      font-size: 26px;
    }
    .piscar { animation: piscar .45s ease-in-out 4; }
    @keyframes piscar { 50% { transform: scale(1.04); filter: brightness(1.4); } }
  </style>
</head>
<body>
  <div class="topo">PAINEL DE ATENDIMENTO</div>

  <div id="card" class="card">
    <div class="label">SENHA</div>
    <div id="senha" class="senha">---</div>
    <div id="mesa" class="mesa">AGUARDE</div>
  </div>

  <div id="historico" class="historico"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const chamadaRef = db.ref('senha_atendimento/chamada');
    const historicoRef = db.ref('senha_atendimento/historico');

    const senhaEl = document.getElementById('senha');
    const mesaEl = document.getElementById('mesa');
    const cardEl = document.getElementById('card');
    const historicoEl = document.getElementById('historico');
    let ultimaChamadaId = null;

    function tocarBip() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.35);
    }

    chamadaRef.on('value', (snap) => {
      const dados = snap.val();
      if (!dados) return;
      senhaEl.textContent = String(dados.senha).padStart(3, '0');
      mesaEl.textContent = 'MESA ' + dados.mesa;
      if (ultimaChamadaId !== dados.id) {
        ultimaChamadaId = dados.id;
        cardEl.classList.remove('piscar');
        void cardEl.offsetWidth;
        cardEl.classList.add('piscar');
        tocarBip();
      }
    });

    historicoRef.limitToLast(5).on('value', (snap) => {
      const lista = [];
      snap.forEach(child => lista.push(child.val()));
      lista.reverse();
      historicoEl.innerHTML = lista.map(item =>
        `<div class="item">Senha ${String(item.senha).padStart(3, '0')} - Mesa ${item.mesa}</div>`
      ).join('');
    });
  </script>
</body>
</html>
