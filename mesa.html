<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mesa</title><link rel="stylesheet" href="style.css"></head><body><main class="page"><div class="mesaPage"><div class="topbar"><div><h1 class="title" id="tituloMesa">Mesa</h1><div class="sub">Controle do atendente</div></div><div><div id="hora" class="clock"></div><div id="data" class="sub"></div></div></div><section class="mesaPanel"><div class="card"><span class="pill green" id="status">Aguardando</span><h2>Senha atual</h2><div class="senhaMesa" id="senhaMesa">---</div><h2 id="motivoAtual">Nenhum atendimento</h2><p id="horaAtual" class="sub"></p><div class="btns"><button class="btn blue" onclick="chamarProxima()">Chamar próxima</button><button class="btn yellow" onclick="rechamar()">Rechamar</button><button class="btn primary" onclick="finalizar()">Finalizar</button><button class="btn red" onclick="ausente()">Ausente</button></div></div><div class="card"><h2>Pessoas aguardando</h2><div class="queueCount" id="totalFila">0</div><div class="stat"><span>Normal</span><b id="filaNormal">0</b></div><div class="stat"><span>Prioritária</span><b id="filaPrioritaria">0</b></div><h2>Aviso da recepção</h2><p id="avisoMesa" style="font-size:24px;font-weight:900;color:#d71920">Sem avisos.</p><button class="btn muted" style="width:100%" onclick="pausar()">Pausar / Voltar</button></div></section></div><div id="toast" class="toast"></div></main><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script><script src="firebase-config.js"></script><script src="app.js"></script><script>
const params=new URLSearchParams(location.search); const MESA=params.get('m')||window.MESA_ID||'1'; const NOME=nomesMesas[MESA]||('Mesa '+MESA); $('tituloMesa').textContent='Mesa de '+NOME;
let atual=null, pausado=false;
async function pegarPrimeiro(fila){ const snap=await db.ref('filas/'+fila).orderByChild('ts').limitToFirst(1).once('value'); const obj=snap.val(); if(!obj)return null; const key=Object.keys(obj)[0]; return {...obj[key],key,fila}; }
async function chamarProxima(){ if(pausado){toast('Mesa pausada.');return} let item=await pegarPrimeiro('prioritaria') || await pegarPrimeiro('normal'); if(!item){toast('Não tem pessoas na fila.');return} await db.ref('filas/'+item.fila+'/'+item.key).remove(); atual={...item,mesa:MESA,nomeMesa:NOME,hora:hora(),chamadaTs:Date.now()}; await db.ref('mesas/'+MESA).set({nome:NOME,status:'Atendendo',atual,hora:atual.hora}); await db.ref('chamadaAtual').set(atual); registrarLog('chamada',atual); toast('Chamando '+item.senha); }
function rechamar(){ if(!atual){toast('Nenhuma senha atual.');return} atual={...atual,hora:hora(),chamadaTs:Date.now(),rechamada:true}; db.ref('chamadaAtual').set(atual); db.ref('mesas/'+MESA).update({atual,hora:atual.hora,status:'Atendendo'}); toast('Rechamando '+atual.senha); }
async function finalizar(){ if(!atual){toast('Nenhuma senha.');return} await db.ref('contadores/'+hoje()+'/atendidos').transaction(v=>(v||0)+1); registrarLog('finalizada',atual); atual=null; db.ref('mesas/'+MESA).set({nome:NOME,status:'Aguardando',hora:hora()}); }
async function ausente(){ if(!atual){toast('Nenhuma senha.');return} registrarLog('ausente',atual); atual=null; db.ref('mesas/'+MESA).set({nome:NOME,status:'Ausente/Aguardando',hora:hora()}); }
function pausar(){ pausado=!pausado; db.ref('mesas/'+MESA).update({nome:NOME,status:pausado?'Pausada':'Aguardando'}); toast(pausado?'Mesa pausada':'Mesa ativa'); }
db.ref('mesas/'+MESA).on('value',s=>{const m=s.val()||{}; atual=m.atual||null; $('status').textContent=m.status||'Aguardando'; $('senhaMesa').textContent=atual?.senha||'---'; $('motivoAtual').textContent=atual?.motivo||'Nenhum atendimento'; $('horaAtual').textContent=atual?.hora?'Chamado às '+atual.hora:'';});
db.ref('filas').on('value',s=>{const v=s.val()||{}; const n=Object.keys(v.normal||{}).length,p=Object.keys(v.prioritaria||{}).length; $('filaNormal').textContent=n;$('filaPrioritaria').textContent=p;$('totalFila').textContent=n+p;});
db.ref('avisoMesas').on('value',s=>{const v=s.val(); $('avisoMesa').textContent=v?`${v.texto} (${v.hora})`:'Sem avisos.'});
</script></body></html>
