<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesa de Andrea</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f6fb; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 35px #0002; width: 420px; text-align: center; }
    h1 { margin-top: 0; color: #123c69; }
    .senha { font-size: 70px; font-weight: bold; margin: 20px 0; color: #123c69; }
    button { width: 100%; border: 0; border-radius: 14px; padding: 20px; margin: 8px 0; font-size: 24px; font-weight: bold; cursor: pointer; }
    .chamar { background: #0b7dda; color: white; }
    .rechamar { background: #ffca28; color: #222; }
    .zerar { background: #e53935; color: white; }
  </style>
</head>
<body>
  <div class="box">
    <h1>MESA DE ANDREA</h1>
    <p>Senha atual</p>
    <div id="senhaAtual" class="senha">---</div>
    <button class="chamar" onclick="chamarProxima()">CHAMAR PRÓXIMA</button>
    <button class="rechamar" onclick="rechamar()">RECHAMAR</button>
    <button class="zerar" onclick="zerar()">ZERAR SENHAS</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const base = db.ref('senha_atendimento');
    const mesa = 2;
    const mesaNome = "Mesa de Andrea";
    let senhaAtual = 0;

    base.child('contador').on('value', snap => {
      senhaAtual = snap.val() || 0;
      document.getElementById('senhaAtual').textContent = String(senhaAtual).padStart(3, '0');
    });

    async function chamarProxima() {
      const contadorRef = base.child('contador');
      const result = await contadorRef.transaction(valor => (valor || 0) + 1);
      const novaSenha = result.snapshot.val();
      registrarChamada(novaSenha);
    }

    function registrarChamada(senha) {
      const dados = { id: Date.now(), senha, mesa, mesaNome, horario: new Date().toLocaleString('pt-BR') };
      base.child('chamada').set(dados);
      base.child('historico').push(dados);
      // Mantém uma lista fixa com as 3 últimas chamadas, na ordem: atual, anterior, anterior.
      base.child('ultimas').transaction(lista => {
        if (!Array.isArray(lista)) lista = [];
        return [dados, ...lista].slice(0, 3);
      });
    }

    function rechamar() {
      if (senhaAtual > 0) registrarChamada(senhaAtual);
    }

    function zerar() {
      if (confirm('Deseja zerar as senhas?')) {
        base.child('contador').set(0);
        base.child('chamada').set({ id: Date.now(), senha: 0, mesa: '-', horario: new Date().toLocaleString('pt-BR') });
        base.child('historico').remove();
        base.child('ultimas').remove();
      }
    }
  </script>
</body>
</html>
