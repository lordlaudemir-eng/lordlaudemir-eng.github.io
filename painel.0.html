<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Atendimento</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #061a40, #123c69);
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .topo {
      position: absolute;
      top: 25px;
      width: 100%;
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .card {
      width: 80%;
      max-width: 1100px;
      min-height: 430px;
      background: rgba(255,255,255,0.13);
      border: 4px solid rgba(255,255,255,0.35);
      border-radius: 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .label { font-size: 50px; opacity: .9; }
    .senha {
      font-size: 180px;
      font-weight: 900;
      line-height: 1;
      margin: 25px 0;
      color: #ffeb3b;
      text-shadow: 6px 6px 0 rgba(0,0,0,0.25);
    }
    .mesa {
      font-size: 80px;
      font-weight: bold;
      background: #ffffff;
      color: #0b2c59;
      padding: 18px 70px;
      border-radius: 22px;
    }
    .historico-box {
      position: absolute;
      bottom: 18px;
      width: 94%;
      text-align: center;
    }
    .historico-titulo {
      font-size: 22px;
      margin-bottom: 8px;
      opacity: .85;
      font-weight: bold;
    }
    .historico {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .item {
      background: rgba(255,255,255,0.18);
      padding: 10px 18px;
      border-radius: 15px;
      font-size: 22px;
      line-height: 1.25;
      min-width: 180px;
    }
    .item small {
      display: block;
      font-size: 15px;
      opacity: .86;
      margin-top: 2px;
    }
    .piscar { animation: piscar .45s ease-in-out 4; }
    .ativar-audio {
      position: absolute;
      top: 18px;
      right: 18px;
      background: #ffeb3b;
      color: #061a40;
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,.25);
      z-index: 5;
    }
    @keyframes piscar { 50% { transform: scale(1.04); filter: brightness(1.4); } }
  </style>
</head>
<body>
  <button id="btnAudio" class="ativar-audio" onclick="ativarAudio()">ATIVAR SOM E VOZ</button>
  <div class="topo">PAINEL DE ATENDIMENTO</div>

  <div id="card" class="card">
    <div class="label">SENHA</div>
    <div id="senha" class="senha">---</div>
    <div id="mesa" class="mesa">AGUARDE</div>
  </div>

  <div class="historico-box">
    <div class="historico-titulo">ÚLTIMAS CHAMADAS</div>
    <div id="historico" class="historico"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const chamadaRef = db.ref('senha_atendimento/chamada');
    const historicoRef = db.ref('senha_atendimento/historico');

    const senhaEl = document.getElementById('senha');
    const mesaEl = document.getElementById('mesa');
    const cardEl = document.getElementById('card');
    const historicoEl = document.getElementById('historico');
    const btnAudio = document.getElementById('btnAudio');

    let ultimaChamadaId = null;
    let audioLiberado = false;
    let audioCtx = null;

    function ativarAudio() {
      audioLiberado = true;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      btnAudio.style.display = 'none';
      tocarBipDuplo();
      setTimeout(() => falar('Som e voz ativados.'), 550);
    }

    function falar(texto) {
      if (!audioLiberado) return;
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(texto);
      msg.lang = 'pt-BR';
      msg.rate = 0.82;
      msg.pitch = 1;
      msg.volume = 1;
      window.speechSynthesis.speak(msg);
    }

    function falarChamada(senha, mesa) {
      if (!audioLiberado || senha <= 0 || mesa === '-') return;
      const numero = String(senha).padStart(3, '0');
      falar(`Senha ${numero}. Dirija-se à mesa ${mesa}.`);
    }

    function bip(frequencia, duracao, atraso = 0) {
      if (!audioLiberado) return;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const inicio = audioCtx.currentTime + atraso;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = frequencia;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.0001, inicio);
      gain.gain.exponentialRampToValueAtTime(0.35, inicio + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, inicio + duracao);
      osc.start(inicio);
      osc.stop(inicio + duracao + 0.03);
    }

    function tocarBipDuplo() {
      bip(880, 0.22, 0);
      bip(1040, 0.28, 0.28);
    }

    chamadaRef.on('value', (snap) => {
      const dados = snap.val();
      if (!dados) return;

      senhaEl.textContent = dados.senha > 0 ? String(dados.senha).padStart(3, '0') : '---';
      mesaEl.textContent = dados.senha > 0 ? 'MESA ' + dados.mesa : 'AGUARDE';

      if (ultimaChamadaId !== null && ultimaChamadaId !== dados.id) {
        cardEl.classList.remove('piscar');
        void cardEl.offsetWidth;
        cardEl.classList.add('piscar');
        tocarBipDuplo();
        setTimeout(() => falarChamada(dados.senha, dados.mesa), 650);
      }
      ultimaChamadaId = dados.id;
    });

    function apenasHora(valor) {
      if (!valor) return '';
      const partes = String(valor).split(' ');
      return partes.length > 1 ? partes[1].slice(0,5) : String(valor).slice(0,5);
    }

    historicoRef.limitToLast(6).on('value', (snap) => {
      const lista = [];
      snap.forEach(child => lista.push(child.val()));
      lista.reverse();
      historicoEl.innerHTML = lista.map(item =>
        `<div class="item">Senha ${String(item.senha).padStart(3, '0')} - Mesa ${item.mesa}<small>${apenasHora(item.horario)}</small></div>`
      ).join('');
    });
  </script>
</body>
</html>
