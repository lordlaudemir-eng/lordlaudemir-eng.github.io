<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Relatório</title><link rel="stylesheet" href="style.css"></head><body><main class="page"><div class="topbar"><div><h1 class="title">Relatório do Dia</h1><div class="sub">Chamadas, finalizadas e ausentes</div></div><div><div id="hora" class="clock"></div><div id="data" class="sub"></div></div></div><div class="card"><button class="btn blue" onclick="carregar()">Atualizar relatório</button><button class="btn yellow" onclick="window.print()">Imprimir</button><div id="resumo" style="margin-top:18px"></div><div id="lista"></div></div></main><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script><script src="firebase-config.js"></script><script src="app.js"></script><script>
async function carregar(){ const s=await db.ref('logs/'+hoje()).once('value'); const logs=Object.values(s.val()||{}).sort((a,b)=>(b.ts||0)-(a.ts||0)); const fin=logs.filter(x=>x.tipo==='finalizada').length, cha=logs.filter(x=>x.tipo==='chamada').length, aus=logs.filter(x=>x.tipo==='ausente').length, emi=logs.filter(x=>x.tipo==='emitida').length; $('resumo').innerHTML=`<div class="grid" style="grid-template-columns:repeat(4,1fr)"><div class="stat"><span>Emitidas</span><b>${emi}</b></div><div class="stat"><span>Chamadas</span><b>${cha}</b></div><div class="stat"><span>Finalizadas</span><b>${fin}</b></div><div class="stat"><span>Ausentes</span><b>${aus}</b></div></div>`; $('lista').innerHTML=logs.map(x=>`<div class="ticket"><div class="s">${x.senha||'---'}</div><div class="m"><b>${x.tipo}</b> • ${x.motivo||''}<br>${x.nomeMesa||''} ${x.hora||''}</div><div></div></div>`).join('')||'<p>Sem registros hoje.</p>'; }
carregar();
</script></body></html>
