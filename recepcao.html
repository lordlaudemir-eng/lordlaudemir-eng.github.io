<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recepção</title><link rel="stylesheet" href="style.css"></head><body><main class="page"><div class="topbar"><div class="logoTitle"><div class="logoMark">ASSISTÊNCIA SOCIAL</div><div><h1 class="title">Recepção - Controle da Fila</h1><div class="sub">Emita senhas, acompanhe filas e avise as mesas.</div></div></div><div><div id="hora" class="clock"></div><div id="data" class="sub"></div></div></div><section class="grid" style="grid-template-columns:1.1fr .9fr"><div class="card"><h2>Emitir nova senha</h2><div class="formrow"><select id="motivo"><option>Cadastro Único</option><option>Bolsa Família</option><option>BPC</option><option>Carteira do Idoso</option><option>Habitação</option><option>Atualização cadastral</option><option>Outros</option></select><select id="destino"><option value="geral">Fila geral</option><option value="1">Preferir Mesa de Laudemir</option><option value="2">Preferir Mesa de Andrea</option></select></div><div class="grid" style="grid-template-columns:1fr 1fr;margin-top:14px"><button class="btn blue" onclick="emitir('normal')">Emitir senha normal</button><button class="btn yellow" onclick="emitir('prioritaria')">Emitir prioritária</button></div><button class="btn red" style="width:100%;margin-top:14px" onclick="zerarDia()">Zerar dia / nova manhã</button></div><div class="card"><h2>Resumo agora</h2><div class="stat"><span>Fila normal</span><b id="qNormal">0</b></div><div class="stat"><span>Fila prioritária</span><b id="qPrioritaria">0</b></div><div class="stat"><span>Total aguardando</span><b id="qTotal">0</b></div><div class="stat"><span>Atendidos hoje</span><b id="atendidos">0</b></div></div><div class="card"><h2>Fila aguardando</h2><div id="listaFila"></div></div><div class="card"><h2>Mesas</h2><div id="mesasResumo"></div><button class="btn muted" style="width:100%;margin-top:14px" onclick="enviarAviso()">Enviar aviso para as mesas</button><input id="aviso" placeholder="Ex.: Recepção cheia, priorizar idosos" style="margin-top:10px"></div></section><div id="toast" class="toast"></div></main><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script><script src="firebase-config.js"></script><script src="app.js"></script><script>
async function proxNumero(tipo){ const ref=db.ref('contadores/'+hoje()+'/'+tipo); const r=await ref.transaction(v=>(v||0)+1); return r.snapshot.val(); }
async function emitir(tipo){ const n=await proxNumero(tipo); const p=tipo==='prioritaria'?'P':'N'; const item={senha:senhaFmt(n,p),tipo,motivo:$('motivo').value,destino:$('destino').value,hora:hora(),ts:Date.now()}; await db.ref('filas/'+tipo).push(item); await registrarLog('emitida',item); toast('Senha emitida: '+item.senha); }
function zerarDia(){ if(!confirm('Zerar senhas, filas e mesas de hoje?'))return; db.ref().update({filas:{normal:null,prioritaria:null}, chamadaAtual:null, mesas:{1:{nome:'Laudemir',status:'Aguardando'},2:{nome:'Andrea',status:'Aguardando'}}, contadores:{[hoje()]:{normal:0,prioritaria:0,atendidos:0}}}); toast('Dia zerado.'); }
function enviarAviso(){ const texto=$('aviso').value.trim(); if(!texto)return; db.ref('avisoMesas').set({texto,hora:hora(),ts:Date.now()}); toast('Aviso enviado.'); }
function renderFila(normal={},prioritaria={}){ const arr=[...Object.entries(prioritaria).map(([k,v])=>({...v,key:k,fila:'prioritaria'})),...Object.entries(normal).map(([k,v])=>({...v,key:k,fila:'normal'}))].sort((a,b)=>a.ts-b.ts); $('listaFila').innerHTML=arr.slice(0,12).map(x=>`<div class="ticket"><div class="s">${x.senha}</div><div class="m">${x.motivo}<br><span class="small">${x.tipo==='prioritaria'?'Prioritária':'Normal'} • ${x.hora}</span></div><button class="btn red" onclick="remover('${x.fila}','${x.key}')">X</button></div>`).join('')||'<p>Ninguém aguardando.</p>'; $('qNormal').textContent=Object.keys(normal).length; $('qPrioritaria').textContent=Object.keys(prioritaria).length; $('qTotal').textContent=Object.keys(normal).length+Object.keys(prioritaria).length; }
function remover(fila,key){ db.ref('filas/'+fila+'/'+key).remove(); }
db.ref('filas').on('value',s=>{const v=s.val()||{}; renderFila(v.normal||{},v.prioritaria||{});});
db.ref('mesas').on('value',s=>{const v=s.val()||{}; $('mesasResumo').innerHTML=[1,2].map(i=>{const m=v[i]||{};return `<div class="stat"><span>Mesa ${i} - ${m.nome||nomesMesas[i]}</span><b>${m.atual?.senha||'---'} ${m.hora||''}</b></div>`}).join('')});
db.ref('contadores/'+hoje()+'/atendidos').on('value',s=>$('atendidos').textContent=s.val()||0);
</script></body></html>
